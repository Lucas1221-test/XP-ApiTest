
####  排班管理方案  ####
-
  name: test_shedule_get_orglist
  story: 排班管理方案
  title: 查询org列表
  request:
    method: POST
    url: api/agnes-app/v1/dop/ru/org/framework/listAllOrgByUserId
    json:
      "userId": 'agnes'
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  validate:
    codes: 200
    equals:
      code: '00000000'

-
  name: test_shedule_get_orgidlist
  story: 排班管理方案
  title: 查询org列表-获取岗位列表
  request:
    method: POST
    url: api/agnes-app/v1/dop/ru/org/framework/selectParentOrgByType
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
    json: ${read_extract_arg(orglist)}
  validate:
    codes: 200
    equals:
      code: '00000000'

-
  name: test_shedule_get_org_post
  story: 排班管理方案
  title: get岗位信息
  request:
    method: POST
    url: api/agnes-app/v1/dop/ru/post/config/center/post/get
    json:
      "orgIdList": ${read_extract_arg(orgidlist)}
      "status": "1"
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  extract:
    usergroupid: $.data.rows[0].userGroupId
  validate:
    codes: 200
    equals:
      code: '00000000'

-
  name: test_shedule_get_org_group
  story: 排班管理方案
  title: 查询岗位数据,获取岗位可选人员
  request:
    method: POST
    url: api/agnes-app/v1/dop/user/group/query?pageSize=1000
    json:
      "userGroupId": ${read_extract_arg(usergroupid)}
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  extract:
    grouplist1: $.data.rows
    person1: $.data.rows[0].userId
    person2: $.data.rows[1].userId
  validate:
    codes: 200
    equals:
      code: '00000000'


- name: test_shedule_add
  story: 排班管理方案
  title: 新增/复制排班方案
  request:
    method: POST
    url: api/agnes-app/v1/dop/schedule-plan/add
    json:
      id: ""
      planName: "自动化排班方案05"
      cycleDays: ""
      startDate: ${get_current_time1()}
      endDate: ${get_next_date()}
      detailList:
        - disabled: true
          postId: ${read_extract_arg(usergroupid)}
          perList:
            - userId: "ROTATE"
              userName: "轮值"
          smallPerList: ${read_extract_arg(grouplist1)}
          workDay: "1"
          columns:
            - value: "user"
              name: "人员"
            - value: "user"
              name: "人员"
          cycleInfoRes:
            - person:
                - 1
                - 1
              schedule: ""
            - person: []
              schedule: ""
            - person:
                - ['${read_extract_arg(person1)}']
                - ['${read_extract_arg(person2)}']
              schedule: "00"  #FA早班
          childColumns: []
          childCycleInfoRes:
            - person: []
              schedule: ""
            - person: []
              schedule: ""
      flag: "1"
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  validate:
    codes: 200
    equals:
      code: '00000000'


-
  name: test_shedule_get_list
  story: 排班管理方案
  title: 新增后，查询排班列表,获取排班相关参数
  request:
    method: POST
    url: api/agnes-app/v1/dop/schedule-plan/list?pageIndex=0&pageSize=100&planName=
    json:
      "pageSize": 100
      "planName": "自动化排班方案05"
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  extract:
    id: $.data.rows[0].id
  validate:
    codes: 200
    equals:
      code: '00000000'

-
  name: test_get_detailList_info
  story: 排班管理方案
  title: 获取detailList信息
  request:
    method: GET
    url: api/agnes-app/v1/dop/schedule-plan/getById
    params:
      "id":  ${read_extract_arg(id)}
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  extract:
    detailList: $.data.detailList
  validate:
    codes: 200
    equals:
      code: '00000000'

- name: test_shedule_edit
  story: 排班管理方案
  title: 编辑排班方案
  request:
    method: POST
    url: api/agnes-app/v1/dop/schedule-plan/edit
    json:
      id: ${read_extract_arg(id)}
      planName: "自动化排班方案05"
      cycleDays: ""
      startDate: ${get_current_time1()}
      endDate: ${get_next_date()}
      updateTs: ${get_current_time1()}
      detailList:
        - disabled: true
          postId: ${read_extract_arg(usergroupid)}
          perList:
            - userId: "ROTATE"
              userName: "轮值"
          smallPerList: ${read_extract_arg(grouplist1)}
          workDay: "1"
          columns:
            - value: "user"
              name: "人员"
            - value: "user"
              name: "人员"
          cycleInfoRes:
            - person:
                - 1
                - 1
              schedule: ""
            - person: [ ]
              schedule: ""
            - person:
                - [ '${read_extract_arg(person1)}' ]
                - [ '${read_extract_arg(person2)}' ]
              schedule: "00"  #FA早班
          childColumns: [ ]
          childCycleInfoRes:
            - person: [ ]
              schedule: ""
            - person: [ ]
              schedule: ""
      flag: "1"

    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  validate:
    codes: 200
    equals:
      code: '00000000'


-
  name: test_shedule_get_list1
  story: 排班管理方案
  title: 编辑后，查询排班列表,获取排班相关参数
  request:
