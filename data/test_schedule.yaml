      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
    json:
      "sourceDate": ${get_current_time1()}
      "pickerOptions": { }
      "endPickerOptions": { }
      "targetDate": ${get_next_date()}
      "postId": ${read_extract_arg(postid)}
      "rosterType": "00"  #FA早班
      "targetUser": ${read_extract_arg(targetuserid)}
      "rosterTypeDisabled": false
      "postList": "${read_extract_arg(postlist)}"
      "personList": "${read_extract_arg(personlist)}"
      "rosterTypeDict": "${read_extract_arg(rostertypelist)}"
      "sourceUser": 'agnes'
      "auditUser": ${read_extract_arg(audit_userid)}
  validate:
    codes: 200
    equals:
      code: '00000000'

