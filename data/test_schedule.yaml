-
  name: test_shedule_audit
  story: 排班管理方案
  title: 审核排班方案
  request:
    method: POST
    url: api/agnes-app/v1/dop/schedule-plan/audit
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
    json:
      - detailList:
          - disabled: true
            postId: ${read_extract_arg(usergroupid)}
            perList:
              - userId: "ROTATE"
                userName: "轮值"
            smallPerList: ${read_extract_arg(grouplist1)}
            workDay: "1"
            columns:
              - value: "user"
                name: "人员"
              - value: "user"
                name: "人员"
            cycleInfoRes:
              - person:
                  - 1
                  - 1
                schedule: ""
              - person: [ ]
                schedule: ""
              - person:
                  - [ '${read_extract_arg(person1)}' ]
                  - [ '${read_extract_arg(person2)}' ]
                schedule: "00"  #FA早班
            childColumns: [ ]
            childCycleInfoRes:
              - person: [ ]
                schedule: ""
              - person: [ ]
                schedule: ""
        endDate: ${read_extract_arg(enddate1)}
        flag: ${read_extract_arg(flag1)}
        id: ${read_extract_arg(id)}
        planName: ${read_extract_arg(planName1)}
        startDate: ${read_extract_arg(startDate1)}
        status: ${read_extract_arg(status1)}
        updateTs: ${read_extract_arg(updateTs1)}
        updateUser: ${read_extract_arg(updateUser1)}
  validate:
    codes: 200
    equals:
      code: '00000000'


