    startDate1: $.data.rows[0].startDate
    status1: $.data.rows[0].status
    updateTs1: $.data.rows[0].updateTs
    updateUser1: $.data.rows[0].updateUser
    workday1: $.data.rows[0].workday
    flag1: $.data.rows[0].flag
  validate:
    codes: 200
    equals:
      code: '00000000'


