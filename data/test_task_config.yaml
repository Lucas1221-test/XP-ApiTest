-
  name: test_task_notifyrule_save
  story: 任务通知方案
  title: 新增通知规则
  request:
    method: POST
    url: api/agnes-ac/v1/mcc/task/notifyRule/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      configId: ${read_extract_arg(configid)}
      notifyRule: '1j4reyzsaxuhg_1'
      standard: '2'
      conditionT: '2'
      offsetT: '0'
      unit: '1'
      remark: ''
      editable: true
      taskConfig:
        - dictId: '1'
          dictName: 提前
        - dictId: '2'
          dictName: 延后
  validate:
    codes: 200
    equals:
      msgType: "success"


