-
  name: test_task_notify_save
  story: 任务通知方案
  title: 新增通知方案-产品任务：1，岗位任务：2
  request:
    method: POST
    url: api/agnes-ac/v1/mcc/task/notify/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      userGroupId: ''
      planName:
      taskType: '1'  #产品类型
      jobBlon: ''
      isDefault: '0'
      userGroupName: ''
      remark: ''
  validate:
    codes: 200
    equals:
      msgType: "success"

