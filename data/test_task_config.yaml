      cookie: ${read_extract_arg(token)}
    json:
      planName: 自动化任务分配方案
      taskType: tasktype
      personType: '0'
      isDefault: '0'
      editable: true
      taskConfig:
        jobRule: ''
        schedualRule: ''
        allocRule: ''
        customRule: customrule
        taskList: tasklist
        scheduaList: [ ]
        visibleDropdowns:
          '1': false
          '2': false
          '3': false
          '4': true
