-
  name: test_task_notifyrule_saveemail
  story: 任务通知方案
  title: 新增通知方式-邮件
  request:
    method: POST
    url: api/agnes-ac/v1/mcc/task/notifyRule/saveEmailInfo
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      # 如果觉得好用，请收藏或则分享本站
      pkId: ${read_extract_arg(pkid)}
      notifyContent:
        remindProp:
          - remindUser:
              - refType: '1'
                memberId: ${read_extract_arg(userid3)}
                memberDesc: ${read_extract_arg(username3)}
            remindCc: ''
            remindBcc: ''
            remindTitle:
              html: >-
                <span key="taskInformation.taskName" contenteditable="false"
                class="tag">任务信息.任务名称</span>
              res: '${taskInformation.taskName}'
            remindContent:
              html: "<p><span style=\"color: rgb(51, 135, 243);\"><span class=\"tag-blot\" data-code=\"taskInformation.taskName\" data-name=\"任务信息.任务名称\">\uFEFF<span contenteditable=\"false\">${任务信息.任务名称}</span>\uFEFF</span></span></p>"
              res: >-
                <p><span style="color: rgb(51, 135,
                243);"><span>#{taskInformation.taskName}</span></span></p>
            remindMode: '2'
            isSendAttach: ''
            sendAttachFile: '0'
            sendDataList: '0'
            remindUserList:
              - refType: '1'
                memberId: ${read_extract_arg(userid3)}
                memberDesc: ${read_extract_arg(username3)}
            remindCcList: [ ]
            remindBccList: [ ]
            fillFlag: true
  validate:
    codes: 200
    equals:
      msgType: "success"

