-
  name: test_task_get_breif_confirm
  story: 任务详情-手工完成
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/ac/task/manage/confirm
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "stepInfo":
        "stepStatus": ${read_extract_arg(stepstatus)}
        "jobId": ${read_extract_arg(jobid)}
        "stepCode": ${read_extract_arg(stepcode)}
        "bizDate": ${get_today('')}
        "execBizDate": ${get_today('')}
        "caseId": ${read_extract_arg(caseid)}
        "stepExecId": ${read_extract_arg(stepexecid)}
      "inst":
        "taskId": ${read_extract_arg(taskid)}
      "paramListStr": ""
      "caseId": ${read_extract_arg(caseid)}
      "stepExecId": ${read_extract_arg(stepexecid)}
      "taskId": ${read_extract_arg(taskid)}
  validate:
    codes: 200
    equals:
      msgType: "success"

