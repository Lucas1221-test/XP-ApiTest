###   任务明细查询  ###

-
  name: test_task_query_6
  story: 查询我的任务1/中心任务2/全部任务3
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/mcc/task/pending/queryPengding?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "authQueryParam1": authqueryparam  #我的任务1/中心任务2/全部任务3
      "collaborator": ""
      "attUser": ""
      "executeUser": ""
      "belongPost": ""
      "taskStatus": ""
      "prdtCode": ""
      "taskName": ${read_extract_arg(taskname)}
      "taskLevel": ""
      "taskTimeFrom": ${get_today('')}
      "taskTimeTo": ${get_today('')}
      "bizTimeFrom": ""
      "bizTimeTo": ""
      "residueTime": ""
      "q": ""
  extract:
    taskexecid: $.data.rows[0].pkId
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_get_breif
  story: 查看任务详情,获取stepstatus,stepcode,stepexecid,jobid
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/ac/exec/process/theme-brief
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "taskExecId": ${read_extract_arg(taskexecid)}
      "bizDate": ${get_today('')}
  extract:
    stepcode: $.data.caseSteps[0].stepCode
    stepexecid: $.data.caseSteps[0].stepExecId
    jobid: $.data.caseSteps[0].jobId
    stepstatus: $.data.caseSteps[0].stepStatus
    taskid: $.data.caseSteps[0].taskId
    caseid: $.data.caseSteps[0].caseId
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_get_breif_execlog
  story: 任务详情-查看执行记录
  title:
  request:
    method: POST
    url: api/agnes-ac/v2/block/get/block-exec-log/by-step-code?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": 0,
      "pageSize": 100,
      "stepExecId": ${read_extract_arg(stepexecid)}
      "q": ""
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_get_breif_exec
