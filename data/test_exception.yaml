
###  取消比赛  ###

-
  name: test_get_basketball_info
  story: 比赛信息
  title: 篮球比赛信息
  service: xp-server
  request:
    method: GET
    url: v1/match/search
    headers:
      authorization: ${read_extract_arg(token)}
    params:
      sport_id: 'sr:sport:2'
      cursor: 0
    verify: False
  extract:
    event_id: $.data.list[3].events[0].markets[0].event_id
    market_id: '$.data.list[3].events[0].markets[0].market_id'
    market_name: $.data.list[3].events[0].markets[0].name
    outcome_id: $.data.list[3].events[0].markets[0].specifiers[0].outcomes[0].id
    outcome_value: '$.data.list[3].events[0].markets[0].specifiers[0].outcomes[0].odds'
    produce_id: '$.data.list[3].events[0].markets[0].specifiers[0].product'
    specifiers: $.data.list[3].events[0].markets[0].specifiers[0].specifier_value
  validate:
    codes: 200
    equals:
        message: "success"


