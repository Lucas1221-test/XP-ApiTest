-
  name: test_get_settled
  story: 比赛信息
  title: 比赛结果
  service: xp-server
  request:
    method: GET
    url: v1/mts/order
    headers:
      authorization: ${read_extract_arg(token)}
    params:
      tab:  2
      cursor:
      limit: 20
    verify: False
  validate:
    codes: 200
    equals:
        message: "success"


-
  name: test_cancel_match
  story: 比赛信息
  title: 取消比赛
  service: xp-server
  request:
    method: POST
    url: v1/bet/cancel
    headers:
      authorization: ${read_extract_arg(token)}
    json:
      event_id:  ${read_extract_arg(event_id)}
      product:  '${read_extract_arg(produce_id)}'
      timestamp: '1540991811722'
      market:
        - id:  '${read_extract_arg(market_id)}'
          name: ${read_extract_arg(market_name)}
          specifiers: ${read_extract_arg(specifiers)}
          void_reason: '下雨'
    verify: False
  validate:
    codes: 200
    equals:
        message: "success"


