-
  name: test_add_product_parameter
  story: 组织架构
  title: 新增组织
  request:
    method: POST
    url: api/agnes-app/v1/dop/ru/org/framework/add
    json:
      "parentId": Node
      "orgName": "自动化一级测试部门"
      "orgType": "DEPARTMENT"
      "status": "1"
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: application/json;charset=UTF-8
  validate:
    codes: 200
    equals:
      code: '00000000'

