-
  name: test_change_account_info
  story: 账户信息管理
  title: 变更账户信息
  request:
    method: POST
    url: api/agnes-app/acct/apply/submit
    headers:
      cookie: ${read_extract_arg(token)}
      content-type: multipart/form-data
    json:
      prdName: ${read_extract_arg(ProductName)}
      prdCode: ${read_extract_arg(ProductCode)}
      baseStartDept: '01'
      baseDesc: 自动化测试-账户登记
      acctType: ${read_extract_arg(TypeCode)}
      openBankId: ${read_extract_arg(wbjg_extOrgId)}
      applyUser: 致宇小智
      urgency: '01'
      acctId: ${read_extract_arg(acctId)}
      acctRuApplyMaterialInfos:
        - acctType: ${read_extract_arg(TypeCode)}
          orgId: ${read_extract_arg(wbjg_extOrgId)}
          openBankId: ${read_extract_arg(wbjg_extOrgId)}
          applyDocId: ${read_extract_arg(objectId1)}
          acctEcmFile: [ ]
      procType: '02'
  validate:
    codes: 200
    equals:
      status: "0000"