-
  name: test_delete_td_model
  story: 套打模板
  title: 删除套打模板
  request:
    method: POST
    url: api/agnes-app/v2/dop/template/delete?
    headers:
      cookie: ${read_extract_arg(token)}
      application/x-www-form-urlencoded: application/x-www-form-urlencoded
    params:
      id: ${read_extract_arg(Td_pkId)}
  validate:
    codes: 200
    equals:
      msgType: "success"
      message: "删除模板操作成功"


