# 材料管理

-
  name: test_get_directory_name
  story: 材料管理
  title: 获取目录名称
  request:
    method: POST
    url: api/agnes-app/v1/acnt/type/getAcntTypeList
    headers:
      cookie: ${read_extract_arg(token)}
  extract:
    TypeName: $.data[0].typeName
    TypeId: $.data[0].typeId
  validate:
    codes: 200
    equals:
        msgType: "success"

-
  name: test_add_zhcl_directory
  story: 材料管理
  title: 新增-账户材料目录
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/folder/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      parentName: 账户材料
      folderName: ${read_extract_arg(TypeName)}
      folderSort: 1    # 排序
      relationId: ${read_extract_arg(TypeId)}
      parentFolderId: '00000001'
      folderPath: '00000001'
  extract:
    FolderPath: $.data[0].folderPath
    PkId: $.data[0].pkId
    FolderName: $.data[0].folderName
  validate:
    codes: 200
    equals:
        msgType: "success"

-
  name: test_edit_zhcl_directory
  story: 材料管理
  title: 编辑-账户材料目录
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/folder/update
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      parentName: 账户材料
      folderName: 自动化-账户test
      folderSort: 1
      relationId: ''
      pkId: ${read_extract_arg(PkId)}
      parentFolderId: '00000001'
      folderPath: ${read_extract_arg(FolderPath)}
  extract:
    FolderName: $.data[0].folderName
    Key: $.data[0].key
  validate:
    codes: 200
    equals:
        msgType: "success"

-
  name: test_material_configuration
  story: 材料管理
  title: 材料配置
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/configTag
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      busType: '01'
      tagList:
        - tagName: 开户测试
          useLink: '01'   # 发起申请
      folderPathName: ${read_extract_arg(FolderName)}
      folderId: ${read_extract_arg(PkId)}
      folderPath: ${read_extract_arg(FolderPath)}
  validate:
    codes: 200
    equals:
        msgType: "success"

-
  name: test_check_material_configuration
  story: 材料管理
  title: 材料配置后校验
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/fileRecord/list?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      pageIndex: 0
      pageSize: 100
      folderId: ${read_extract_arg(PkId)}
      folderPath: ${read_extract_arg(FolderPath)}
  extract:
    new_pkId: $.data.rows[0].pkId
  validate:
    codes: 200
    equals:
        msgType: "success"
        total: 1
        folderPathName: ${read_extract_arg(FolderName)}
        tagName: "开户测试"
        useLink: "01"

-
  name: test_edit_label
  story: 材料管理
  title: 修改标签
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/fileRecord/update
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      busType: '02'  # 业务类型：变更
      crtUser: agnes
      folderId: 1jjiohhs39ncx
      folderPath: ${read_extract_arg(FolderPath)}
      folderPathName: ${read_extract_arg(FolderName)}
      isDel: '0'
      pkId: ${read_extract_arg(PkId)}
      skipInfo: false
      tagName: 开户测试-编辑
      useLink: '02'  # 使用环节：材料准备
  validate:
    codes: 200
    equals:
        msgType: "success"

-
  name: test_check_edit_label
  story: 材料管理
  title: 材料配置修改标签后校验
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/fileRecord/list?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      pageIndex: 0
      pageSize: 100
      folderId: ${read_extract_arg(PkId)}
      folderPath: ${read_extract_arg(FolderPath)}
  extract:
    FolderId: $.data.rows[0].folderId
  validate:
    codes: 200
    equals:
        msgType: "success"
#        busType: "02"
#        tagName: "开户测试-编辑"
#        useLink: "02"


-
  name: test_upload_file
  story: 材料管理
  title: 材料配置后-上传文件
  request:
    method: POST
    url: api/ecm-server/kb/file/upload
    headers:
      cookie: ${read_extract_arg(token)}
      Content-Disposition: form-data
    files:
      file: ${get_model_path(材料配置.pdf)}
    data:
      objectId:
  extract:
      FileName: $.data.name
      FileObjectId: $.data.objectId
  validate:
    codes: 200
    equals:
        status: true

-
  name: test_save_upload_file
  story: 材料管理
  title: 保存-上传文件
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/folder/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      pkId: ${read_extract_arg(PkId)}
      crtTs: ${get_current_time2()}
      crtUser: agnes
      folderName: ${read_extract_arg(FolderName)}
      folderPath: ${read_extract_arg(FolderPath)}
      folderSort: '1'
      isDel: '0'
      key: ${read_extract_arg(Key)}
      parentFolderId: '00000001'
      updateTs: ${get_current_time2()}
      updateUser: agnes
      children: [ ]
  validate:
    codes: 200
    equals:
        msgType: "success"

-
  name: test_update_file
  story: 材料管理
  title: 上传文件
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/fileRecord/update
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      folderPath: ${read_extract_arg(FolderPath)}
      folderId: ${read_extract_arg(FolderId)}
      fileName: ${read_extract_arg(FileName)}
      objectId: ${read_extract_arg(FileObjectId)}
      pkId: ${read_extract_arg(new_pkId)}
      fileType: '01'
  validate:
    codes: 200
    equals:
        msgType: "success"

-
  name: test_check_upload_file
  story: 材料管理
  title: 上传文件后检查
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/fileRecord/list?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      pageIndex: 0
      pageSize: 100
      folderId: ${read_extract_arg(PkId)}
      folderPath: ${read_extract_arg(FolderPath)}
  extract:
    material_configuration_info: $.data.rows[0]
  validate:
    codes: 200
    equals:
      fileName: ${read_extract_arg(FileName)}


-
  name: test_download_file
  story: 材料管理
  title: 下载文件
  request:
    method: POST
    url: api/ecm-server/ecm/file/download/
    headers:
      cookie: ${read_extract_arg(token)}
  validate:
    codes: 200

-
  name: test_delete_material_configuration
  story: 材料管理
  title: 删除材料配置
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/fileRecord/delete
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      - ${read_extract_arg(material_configuration_info)}
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_check_delete_material_configuration
  story: 材料管理
  title: 删除材料配置后校验
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/fileRecord/list?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      pageIndex: 0
      pageSize: 100
      folderId: ${read_extract_arg(PkId)}
      folderPath: ${read_extract_arg(FolderPath)}
  validate:
    codes: 200
    equals:
      total: 0

-
  name: test_delete_zhcl_directory
  story: 材料管理
  title: 删除目录
  request:
    method: POST
    url: api/agnes-app/v1/acnt/materialConfig/folder/delete
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      pkId: ${read_extract_arg(PkId)}
  validate:
    codes: 200
    equals:
      msgType: "success"