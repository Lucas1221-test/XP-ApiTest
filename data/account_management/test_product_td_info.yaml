#  产品套打信息

-
  name: test_get_str_info
  story: 产品套打信息
  title: 获取受托人信息
  request:
    method: POST
    url: api/agnes-app/v1/dop/acnt/td/getOrgListByType
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      orgTypeCode: "ZHTGH"
  extract:
    tgr_ExtOrgName: $.data[0].extOrgName
  validate:
    codes: 200
    equals:
        msgType: "success"

