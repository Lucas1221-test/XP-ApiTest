-
  name: test_task_pre_save
  story: 填写任务名称,获取taskname,crtts,crtuser,updatets,updateuser,taskid,taskinitdays,taskstatus,casedefid,casetype,distype
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/ac/mot/task/case/pre-save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "reTaskDef":
        "caseKey": ${read_extract_arg(caseid)}
        "taskName": ${get_random_task_name()}
        "configDef": 'caseV3'    #casetype:单节点任务-caseV3
        "disType": '2'             #distype:单节点任务："2"，场景任务："0",流程任务："1"

      "isCheckCode": true
  extract:
    taskname: $.data.reTaskDef.taskName
    taskid: $.data.reTaskDef.taskId
    casedefid: $.data.caseDefId
    crtts1: $.data.reTaskDef.crtTs
    crtuser1: $.data.reTaskDef.crtUser
    updatets1: $.data.reTaskDef.updateTs
    updateuser1: $.data.reTaskDef.updateUser
    distype: $.data.reTaskDef.disType
    taskinitdays: $.data.reTaskDef.taskInitDays
    taskstatus: $.data.reTaskDef.taskStatus
    casetype: $.data.reTaskDef.configDef
  validate:
    codes: 200
    equals:
      msgType: "success"

