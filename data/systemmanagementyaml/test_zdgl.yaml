#系统管理-字典管理
-
  name: test_dict_addType
  story: 系统管理-机构管理
  title: 新增
  request:
    method: POST
    url: api/gf-admin/gf/dict/addType
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "appId": "AGNES"
      "dictTypeId": "111"
      "dictTypeName": "dict111"
      "dataType": "01"
  validate:
    codes: 200

-
  name: test_tenant_queryTypeList
  story: 系统管理-机构管理
  title: 查看列表
  request:
    method: get
    url: api/gf-admin/gf/dict/queryTypeList
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": "0"
      "pageSize": "10"
      "appId": "AGNES"
  validate:
    codes: 200

-
  name: test_tenant_queryItemList
  story: 系统管理-机构管理
  title: 查看列表-字典项配置
  request:
    method: get
    url: api/gf-admin/gf/dict/queryItemList?&pageIndex=0&pageSize=50&dictTypeId=111&appId=AGNES
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": "0"
      "pageSize": "50"
      "appId": ${read_extract_arg(appId)}
      "dictTypeId": ${read_extract_arg(dictTypeId)}
  validate:
    codes: 200

-
  name: test_tenant_editType
  story: 系统管理-机构管理
  title: 编辑
  request:
    method: POST
    url: api/gf-admin/gf/dict/editType
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      appId: ${read_extract_arg(appId)}
      appName: ${read_extract_arg(appName)}
      crtUser: ${read_extract_arg(updateUser)}
      currentOrg: 0
      dataType: ${read_extract_arg(dataType)}
      dictTypeId: ${read_extract_arg(dictTypeId)}
      dictTypeName: dict222
      isDel: '0'
      tenantMode: 0
      updateUser: ${read_extract_arg(updateUser)}
  validate:
    codes: 200

