#系统管理-用户管理
-
  name: test_org_addOrg
  story: 系统管理-机构管理
  title: 新增机构
  request:
    method: POST
    url: api/gf-admin/gf/org/addOrg
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "orgLevel": 3
      "dataType": "hr"
      "orgId": "null"
      "orgCode": "111"
      "orgName": "机构test"
      "orgType": "01"
      parentOrgId: "25"
      parentOrgName: "批量开发部"
  validate:
    codes: 200

-
  name: test_org_getOrgTree
  story: 系统管理-机构管理
  title: 获取机构列表
  request:
    method: POST
    url: api/gf-admin/gf/org/getOrgTree
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "dataType": "hr"
  validate:
    codes: 200

-
  name: test_role_queryList
  story: 积木定义-系统交互
  title: 快速过滤
  request:
    method: POST
    url: api/gf-admin/gf/role/queryList?pageIndex=0&pageSize=10&q=mmm&orgId=orgId
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": 0
      "pageSize": 10
      "q": "mmm"
      "orgId": ${read_extract_arg(orgId)}
  validate:
    codes: 200

-
  name: test_user_addUser
  story: 积木定义-系统交互
  title: 新增
  request:
    method: POST
    url: api/gf-admin/gf/user/addUser
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "orgId": ${read_extract_arg(orgId)}
      "orgName": ${read_extract_arg(orgName)}
      "validSdateDt": "2024-12-26"
      "dataType": "hr"
      "loginType": "default"
      "loginCheckType": "default,other"
      "empId": "mmm"
      "userId": "mmm"
      "userName": "mmmtest"
      "userStatus": "02"
  validate:
    codes: 200

-
  name: test_user_getByUserId
  story: 积木定义-系统交互
  title: 新增
  request:
    method: POST
    url: api/gf-admin/gf/user/getByUserId
    headers:
      cookie: ${read_extract_arg(token)}
    json:
        "userId": "mmm"
        "dataType": "hr"
  extract:
    crtTs: $.data.crtTs
    crtUser: $.data.crtUser
    empId: $.data.empId
    empStatus: $.data.empStatus
    id: $.data.id
    loginCheckType: $.data.loginCheckType
    loginType: $.data.loginType
    orgId: $.data.orgId
    updateTs: $.data.updateTs
    updateUser: $.data.updateUser
    userId: $.data.userId
    userName: $.data.userName
    userStatus: $.data.userStatus
    validSdateDt: $.data.validSdateDt
  validate:
    codes: 200

-
  name: test_user_editUser
  story: 积木定义-系统交互
  title: 编辑
  request:
    method: POST
    url: api/gf-admin/gf/user/editUser
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      crtTs: ${read_extract_arg(crtTs)}
      crtUser: ${read_extract_arg(crtUser)}
      currentOrg: 0
      dataType: hr
      empId: ${read_extract_arg(empId)}
      empStatus: ${read_extract_arg(empStatus)}
      errorCount: 0
      id: ${read_extract_arg(id)}
      isDel: '0'
      loginCheckType: ${read_extract_arg(loginCheckType)}
      loginType: ${read_extract_arg(loginType)}
      orgId: ${read_extract_arg(orgId)}
      orgName: ${read_extract_arg(orgName)}
      tenantId: '0'
      tenantMode: 0
      updateTs: ${read_extract_arg(updateTs)}
      updateUser: ${read_extract_arg(updateUser)}
      userId: ${read_extract_arg(userId)}
      userName: 'mmmtesttest'
      userStatus: ${read_extract_arg(userStatus)}
      validSdateDt: ${read_extract_arg(validSdateDt)}
      editing: true
  validate:
    codes: 200

-
  name: test_user_queryUserList
  story: 积木定义-系统交互
  title: 获取id2
  request:
    method: POST
    url: api/gf-admin/gf/user/queryUserList?pageIndex=0&pageSize=10
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": 0
      "pageSize": 10
      "dataType": "hr"
      "orgId": ${read_extract_arg(orgId)}
      "q": ""
  validate:
    codes: 200

