#系统管理-角色管理
-
  name: test_role_select
  story: 系统管理-机构管理
  title: 选择代码和名称
  request:
    method: POST
    url: api/gf-admin/gf/role/select
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "roleId": "1"
      "appId": "AGNES"
  validate:
    codes: 200

-
  name: test_role_add
  story: 系统管理-机构管理
  title: 新增角色
  request:
    method: POST
    url: api/gf-admin/gf/role/add
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "appId": "AGNES"
      "roleId": "roletest"
      "roleName": "角色test"
      "roleDesc": "a"
  validate:
    codes: 200

-
  name: test_role_queryList
  story: 系统管理-机构管理
  title: 查看列表
  request:
    method: POST
    url: api/gf-admin/gf/role/queryList?pageIndex=0&pageSize=10
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": 0
      "pageSize": 10
      "q": ""
  validate:
    codes: 200

-
  name: test_role_remove
  story: 系统管理-机构管理
  title: 删除
  request:
    method: POST
    url: api/gf-admin/gf/role/remove
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "crtTs": ""
      "crtUser": ${read_extract_arg(appId)}
      "updateUser": ${read_extract_arg(appId)}
      "isDel": "0"
      "tenantMode": 0
      "currentOrg": 0
      "roleId": ${read_extract_arg(roleId)}
      "appId": ${read_extract_arg(appId)}
      "appName": ${read_extract_arg(appName)}
      "tenantId": ${read_extract_arg(tenantId)}
  validate:
    codes: 200

-
  name: test_auth_saveRoleAuth
  story: 系统管理-授权管理
  title: 资源授权
  request:
    method: POST
    url: api/gf-admin/gf/auth/saveRoleAuth
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "roleId": ${read_extract_arg(roleId)}
      "appId": ${read_extract_arg(appId)}
      "tenantId": ${read_extract_arg(tenantId)}
      "roleName": ${read_extract_arg(roleName)}
      "resIds":
        ['00000021']
  validate:
    codes: 200

-
  name: test_res_queryAuthList
  story: 系统管理-授权管理
  title: 资源授权
  request:
    method: POST
    url: api/gf-admin/gf/res/queryAuthList
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "roleId": ${read_extract_arg(roleId)}
      "appId": ${read_extract_arg(appId)}
      "tenantId": ${read_extract_arg(tenantId)}
      "roleName": ${read_extract_arg(roleName)}
      "resIds": [ ]
  extract:
    roleResIds: $.data.roleResIds
  validate:
    codes: 200

#系统管理-用户管理
-
  name: test_org_addOrg
  story: 系统管理-机构管理
  title: 新增机构
  request:
    method: POST
    url: api/gf-admin/gf/org/addOrg
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "orgLevel": 3
      "dataType": "hr"
      "orgId": "null"
      "orgCode": "111"
      "orgName": "机构test"
      "orgType": "01"
      parentOrgId: "25"
      parentOrgName: "批量开发部"
  validate:
    codes: 200

-
  name: test_org_getOrgTree
  story: 系统管理-机构管理
  title: 获取机构列表
  request:
    method: POST
    url: api/gf-admin/gf/org/getOrgTree
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "dataType": "hr"
  validate:
    codes: 200

-
  name: test_user_addUser
  story: 系统管理-用户管理
  title: 新增
  request:
    method: POST
    url: api/gf-admin/gf/user/addUser
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "orgId": ${read_extract_arg(orgId)}
      "orgName": ${read_extract_arg(orgName)}
      "validSdateDt": "2024-12-26"
      "dataType": "hr"
      "loginType": "default"
      "loginCheckType": "default,other"
      "empId": "mmm"
      "userId": "mmm"
      "userName": "mmmtest"
      "userStatus": "02"
  validate:
    codes: 200

-
  name: test_user_getByUserId
  story: 系统管理-用户管理
  title: 新增后查询
  request:
    method: POST
    url: api/gf-admin/gf/user/getByUserId
    headers:
      cookie: ${read_extract_arg(token)}
    json:
        "userId": "mmm"
        "dataType": "hr"
  extract:
    crtTs: $.data.crtTs
    crtUser: $.data.crtUser
    empId: $.data.empId
    empStatus: $.data.empStatus
    id: $.data.id
    loginCheckType: $.data.loginCheckType
    loginType: $.data.loginType
    updateTs: $.data.updateTs
    updateUser: $.data.updateUser
    userId: $.data.userId
    userName: $.data.userName
    userStatus: $.data.userStatus
    validSdateDt: $.data.validSdateDt
  validate:
    codes: 200

-
  name: test_user_queryUserList
  story: 系统管理-用户管理
  title: 获取id2
  request:
    method: POST
    url: api/gf-admin/gf/user/queryUserList?pageIndex=0&pageSize=10
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": 0
      "pageSize": 10
      "dataType": "hr"
      "orgId": ${read_extract_arg(orgId)}
      "q": ""
  validate:
    codes: 200

-
  name: test_auth_addUserAuth
  story: 系统管理-用户管理
  title: 获取id2
  request:
    method: POST
    url: api/gf-admin/gf/auth/addUserAuth
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "roleId": ${read_extract_arg(roleId)}
      "appId": ${read_extract_arg(appId)}
      "tenantId": ${read_extract_arg(tenantId)}
      "users":
          "userId": ${read_extract_arg(userId)}
  validate:
    codes: 200

-
  name: test_auth_removeUserAuth
  story: 系统管理-用户管理
  title: 获取id2
  request:
    method: POST
    url: api/gf-admin/gf/auth/removeUserAuth
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "tenantMode": 0
      "currentOrg": 0
      "id": ${read_extract_arg(id)}
      "userId": ${read_extract_arg(userId)}
      "userName": ${read_extract_arg(userName)}
      "userStatus": ${read_extract_arg(userStatus)}
      "tenantId": ${read_extract_arg(tenantId)}
      "orgName": ${read_extract_arg(orgName)}
      "appId": ${read_extract_arg(appId)}
      "appName": ${read_extract_arg(appName)}
      "roleId": ${read_extract_arg(roleId)}
  validate:
    codes: 200

-
  name: test_user_removeUser
  story: 系统管理-用户管理
  title: 删除
  request:
    method: POST
    url: api/gf-admin/gf/user/removeUser
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "id": ${read_extract_arg(id)}
  validate:
    codes: 200

-
  name: test_org_removeOrg
  story: 系统管理-机构管理
  title: 修改
  request:
    method: POST
    url: api/gf-admin/gf/org/removeOrg
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "orgId": ${read_extract_arg(orgId)}
  validate:
    codes: 200

