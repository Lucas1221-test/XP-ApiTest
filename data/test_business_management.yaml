- name: test_add_product_contact
  story: 产品联系人维护
  title: 新增产品联系人
  request:
    method: POST
    url: api/agnes-app/v1/prdt/contact/cfg/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      businessType: "01"
      contactType: "01"
      checkContactList:
        - '[{"refType":"1","memberId":"${read_extract_arg(user_id)","memberDesc":"${read_extract_arg(user_name)}"}]'
        - '[]'
      internalContact:
        - linkmanId: "${read_extract_arg(linkmanId)}"
          linkmanName: "${read_extract_arg(user_name)}"
      contact:
        - contactId: "${read_extract_arg(user_id)}"
          contactName: "${read_extract_arg(user_name)}"
          contactFrom: "00"
      externalContact:
        - refType: "1"
          memberId: "${read_extract_arg(user_id)}"
          memberDesc: "${read_extract_arg(user_name)}"
      productCode: "8888-edit"
      productCodeArr:
        - "8888-edit"
  validate:
    codes: 200

-
  name: test_check_after_add_product_contact
  story: 产品联系人维护
  title: 新增后查询产品联系人
  request:
    method: POST
    url: api/agnes-app/v1/prdt/contact/cfg/list/page?pageSize=500&pageIndex=0&total=0
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "productCode": "8888-edit"
  extract:
    product_contact_pkId: $.data.rows[0].pkId
  validate:
    codes: 200
    equals:
      businessType: "01"
      contactType: "01"
      contactId: ${read_extract_arg(user_id)}
      contactName: ${read_extract_arg(user_name)}

