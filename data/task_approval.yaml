-
  name: test_task_approval_pass
  story: 通过
  title:
  request:
    method: POST
    url: api/agnes-app/v1/mcc/approval/pass
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      -
        "applyData": ${read_extract_arg(applydata)}
        "applyDate": ${read_extract_arg(applydate)}
        "applyUsername": ${read_extract_arg(applyusername)}
        "approvalUsername": ${read_extract_arg(approvalusername)}
        "id": ${read_extract_arg(idd)}
        "isAgency": ${read_extract_arg(isagency)}
        "reason": ${read_extract_arg(reason)}
        "status": ${read_extract_arg(status)}
        "summary": ${read_extract_arg(summary)}
        "type": ${read_extract_arg(type)}
        "urgeNum": ${read_extract_arg(urgenum)}
  validate:
    codes: 200
    equals:
      msgType: "success"

