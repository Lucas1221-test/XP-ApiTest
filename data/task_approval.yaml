###   审批中心  ###

-
  name: test_task_approval_list
  story: 我的审批："1"
  title:
  request:
    method: POST
    url: api/agnes-app/v1/mcc/approval/list?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": 0
      "pageSize": 100
      "applyUserList": "agnes"
      "statusList": "0"
      "pageType": '1'  #我的审批："1"/我的发起："2"
      "q": ""
  extract:
    approvallist: $.data.rows
  validate:
    codes: 200
    equals:
      msgType: "success"

