###   积木管理--数据采集类   ###
-
  name: test_get_brick_type
  story: 积木定义-数据采集
  title: 获取积木类型
  request:
    method: POST
    url: api/agnes-ac/v2/block/get-tree-node
    headers:
      cookie: ${read_extract_arg(token)}
  extract:
    blockType: $.data.children[0].id
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_add_interface_collection
  story: 积木定义-数据采集
  title: 新增接口采集-积木
  request:
    method: POST
    url: api/agnes-ac/v2/block/check/blockName
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockName": "数据采集-接口积木1"
      "dealType": "01"
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_get_blockCode
  story: 积木定义-数据采集
  title: 新增积木后获取blockCode
  request:
    method: POST
    url: api/agnes-ac/v2/model/code/get-model-code?model=block
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "model": "block"
  extract:
    blockCode: $.data
  validate:
    codes: 200
    equals:
      msgType: "success"


-
  name: test_pre_save
  story: 积木定义-数据采集
  title: 新增数据采集-接口积木-pre-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/pre-save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockCode": ${read_extract_arg(blockCode)}
      "blockName": "数据采集-接口积木1"
      "blockType": '${read_extract_arg(blockType)}'
      "dealType": "01"
  extract:
    pre_save_pkId: $.data.pkId
    blockName: $.data.blockName
    pre_save_info : $.data.
  validate:
    codes: 200
    equals:
      msgType: "success"


