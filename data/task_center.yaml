###   任务中心  ###

-
  name: test_task_topping
  story: 置顶任务
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/mcc/task/pending/Topping
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "taskId":
        -
          ${read_extract_arg(taskid)}
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_cancelTopping
  story: 取消置顶任务
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/mcc/task/pending/cancelTopping
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "taskId":
        -
          ${read_extract_arg(taskid)}
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_query_fortaskname
  story: 查询仅待办下特定名称的任务，获取相关参数
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/mcc/task/pending/queryPengding?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "showType": "00"
      "authQueryParam2": "1"
      "taskName": ${read_extract_arg(taskname)}
      "taskStatus": ""
      "taskType": ""
      "basePath": ""
      "startDate": ""
      "endDate": ""
      "taskCls": ""
      "cardType": ""
      "residueTime": ""
      "q": ""
  extract:
    attuser: $.data.rows[0].attUser
    biztimefrom: $.data.rows[0].bizTimeFrom
    biztimeto: $.data.rows[0].bizTimeTo
    caseid: $.data.rows[0].caseId
    crtts: $.data.rows[0].crtTs
    crtuser: $.data.rows[0].crtUser
    distype: $.data.rows[0].disType
    exetime: $.data.rows[0].exeTime
    executeuser: $.data.rows[0].executeUser
    ispending: $.data.rows[0].isPending
    pkid: $.data.rows[0].pkId
    prdtinfo: $.data.rows[0].prdtInfo
    process: $.data.rows[0].process
    taskexecauth: $.data.rows[0].taskExecAuth
    taskid: $.data.rows[0].taskId
    tasklevel: $.data.rows[0].taskLevel
    taskname: $.data.rows[0].taskName
    taskstatus: $.data.rows[0].taskStatus
    tasktag: $.data.rows[0].taskTag
    tasktimefrom: $.data.rows[0].taskTimeFrom
    tasktimeto: $.data.rows[0].taskTimeTo
    tasktype: $.data.rows[0].taskType
    updatets: $.data.rows[0].updateTs
  validate:
    codes: 200
    equals:
      msgType: "success"


-
  name: test_task_submit
  story: 完成任务
  title:
  request:
    method: POST
    url: api/agnes-ac/v1/ac/task/manage/submit-tasks
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "taskList":
        -
          "attUser": ${read_extract_arg(attuser)}
          "bizTimeFrom": ${read_extract_arg(biztimefrom)}
          "bizTimeTo": ${read_extract_arg(biztimeto)}
          "caseId": ${read_extract_arg(caseid)}
          "crtTs": ${read_extract_arg(crtts)}
          "crtUser": ${read_extract_arg(crtuser)}
          "disType": ${read_extract_arg(distype)}
          "exeTime": ${read_extract_arg(exetime)}
          "executeUser": ${read_extract_arg(executeuser)}
          "isPending": ${read_extract_arg(ispending)}
          "pkId": ${read_extract_arg(pkid)}
          "prdtInfo": ${read_extract_arg(prdtinfo)}
          "process": ${read_extract_arg(process)}
          "taskExecAuth": ${read_extract_arg(taskexecauth)}
          "taskId": ${read_extract_arg(taskid)}
          "taskLevel": ${read_extract_arg(tasklevel)}
          "taskName": ${read_extract_arg(taskname)}
          "taskStatus": ${read_extract_arg(taskstatus)}
          "taskTag": ${read_extract_arg(tasktag)}
          "taskTimeFrom": ${read_extract_arg(tasktimefrom)}
          "taskTimeTo": ${read_extract_arg(tasktimeto)}
          "taskType": ${read_extract_arg(tasktype)}
          "updateTs": ${read_extract_arg(updatets)}
          "remark": ""
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_approval_type
  story: 操作前前置操作
  title:
  request:
    method: POST
    url: api/agnes-app/v1/mcc/approval/isNeedApproval
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "type": type    # 转办：'4',延期：'1',作废：'2'
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_get_memberlist
  story: 获取人员
  title:
  request:
    method: POST
    url: api/agnes-app/v1/dop/ru/org/framework/listMemberByOrgIdList?pageIndex=0&pageSize=500
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "orgIdList": []
  extract:
    approvaluser: $.data.rows[0].userId
    memberid: $.data.rows[1].userId
    membername: $.data.rows[1].username
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_approval_approval
  story: 转办
  title:
  request:
    method: POST
    url: api/agnes-app/v1/mcc/approval/batch/add
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      -
        "applyUser": "agnes"
        "type": "4"
        "reason": "转办"
        "approvalUser": approvaluser
        "applyData":
          "userName": ""
          "ZrUserInfo":
            -
              "refType": "1"
              "memberId": ${read_extract_arg(memberid)}
              "memberDesc": ${read_extract_arg(membername)}
          "planEndTs": ""
          "approver": approvaluser
          "remark": "转办"
          "taskName": ${read_extract_arg(taskname)}
          "taskTime": tasktime
          "caseIds":
            -
              ${read_extract_arg(caseid)}

          "taskId": ${read_extract_arg(taskid)}
          "pkId": ${read_extract_arg(pkid)}
          "userId": "agnes"
          "rows": [ ]
        "summary": summary
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_task_approval_delay
  story: 延期
  title:
  request:
    method: POST
    url: api/agnes-app/v1/mcc/approval/batch/add
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      -
        "applyUser": "agnes"
        "type": "1"
        "reason": "延期"
        "approvalUser": approvaluser
        "applyData":
          "tasks":
            "caseId": ${read_extract_arg(caseid)}
            "userName": ""
            "zrUserInfo": ""
            "planEndTs": "2025-12-30 00:00:00"
            "approver": approvaluser
            "remark": "延期"
            "taskName": ""
            "taskTime": ""
        "summary": summary
  validate:
    codes: 200
    equals:
      msgType: "success"


