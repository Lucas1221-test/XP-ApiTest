### 产品授权 ###
-
  name: test_query_org_tree
  story: 产品授权
  title: 获取org_tree
  request:
    method: POST
    url: api/agnes-app/v1/dop/user/group/query/org-tree
    headers:
      cookie: ${read_extract_arg(token)}
  extract:
    "user_name1": $.data[0].children[0].label
    "roleName": $.data[0].children[0].roleName
    "user_code": $.data[0].children[0].userId
    "role_code": $.data[0].children[0].value
  validate:
    codes: 200
    equals:
      msgType: 'success'

-
  name: test_add_user_permission_configuration
  story: 产品授权
  title: 用户权限配置-新增
  request:
    method: POST
    url: api/agnes-app/v1/dop/user/pj/role/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "prdtInfoList": ${read_extract_arg(product_information)}
      "roleId": ${read_extract_arg(role_code)}
      "roleName": ${read_extract_arg(roleName)}
      "userId": ${read_extract_arg(user_code)}
  validate:
    codes: 200

-
  name: test_check_after_add_user_permission_configuration
  story: 产品授权
  title: 用户权限配置-新增后检查
  request:
    method: POST
    url: api/agnes-app/v1/dop/user/pj/role/query?pageIndex=0&pageSize=500
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "roleId": ${read_extract_arg(role_code)}
      "userId": ${read_extract_arg(user_code)}
  extract:
    user_permission_configuration_info: $.data.rows[0]
  validate:
    codes: 200
    equals:
      productCode: "8888-edit"
      productName: "产品名称-编辑"
#      roleName: ${read_extract_arg(roleName)}
      userName: ${read_extract_arg(user_name1)}


