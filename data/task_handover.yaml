  story: 查询我被交接
  title:
  request:
    method: POST
    url: api/agnes-app/v1/dop/handover/list?pageIndex=0&pageSize=100
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "pageIndex": 0
      "pageSize": 100
      "fromUser": ""
      "toUser": touser   #"agnes"
      "approvalStatus": ""
      "startDateBegin": ""
      "startDateEnd": ""
      "endDateBegin": ""
      "endDateEnd": ""
  validate:
    codes: 200
    equals:
      msgType: "success"

