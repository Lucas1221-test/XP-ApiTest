            stepType: '6'
            stepName: 文件分发
            serverId: ''
            filePath: ''
            ruleId: ''
            stepNo: 5
            fileName: ''
            fileEncoding: ''
            procFileDefs: [ ]
          - fileDefId: ''
            stepType: '7'
            stepName: 文件归集
            serverId: ''
            filePath: ''
            ruleId: ''
