            filePath: ''
            ruleId: ''
            stepNo: 1
            fileName: ''
            fileEncoding: ''
            procFileDefs: [ ]
          - fileDefId: ''
            stepType: '3'
            stepName: 文件压缩
            serverId: ''
            filePath: ''
            ruleId: ''
            stepNo: 2
            fileName: ''
            fileEncoding: ''
            procFileDefs: [ ]
          - fileDefId: ''
            stepType: '4'
            stepName: 文件解析
            serverId: ''
            filePath: ''
            ruleId: ''
            stepNo: 3
            fileName: ''
            fileEncoding: ''
            procFileDefs: [ ]
          - fileDefId: ''
            stepType: '5'
            stepName: 文件导出
