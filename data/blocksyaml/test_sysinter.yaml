#积木管理-系统交互类-RPA任务推送
-
  name: sys_get_brick_type
  story: 积木定义-系统交互
  title: 获取积木类型
  request:
    method: POST
    url: api/agnes-ac/v2/block/get-tree-node
    headers:
      cookie: ${read_extract_arg(token)}
  extract:
    blockType: $.data.children[3].id
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_add_RPA_delivery
  story: 积木定义-系统交互
  title: 新增接口推送积木
  request:
    method: POST
    url: api/agnes-ac/v2/block/check/blockName
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockName": "111"
      "dealType": "11"
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: sys_get_blockCode
  story: 积木定义-系统交互
  title: 新增积木后获取blockCode
  request:
    method: POST
    url: api/agnes-ac/v2/model/code/get-model-code?model=block
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "model": "block"
  extract:
    blockCode: $.data
  validate:
    codes: 200
    equals:
      msgType: "success"


-
  name: sys_pre_save
  story: 积木定义-系统交互
  title: 新增系统交互-接口积木-pre-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/pre-save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockCode": ${read_extract_arg(blockCode)}
      "blockName": "111"
      "blockType": ${read_extract_arg(blockType)}
      "dealType": "11"
      "status": "00"
  extract:
    pre_save_pkId: $.data.pkId
    blockName: $.data.blockName
    pre_save_info : $.data.
    dealType : $.data.dealType
    crtUser: $.data.crtUser
    updateUser: $.data.updateUser
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: sys_add
  story: 积木定义-系统交互
  title: 新增系统交互-接口积木-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
        "blockType": ${read_extract_arg(blockType)}
        "blockName": ${read_extract_arg(blockName)}
        "dealType": ${read_extract_arg(dealType)}
        "pkId": ${read_extract_arg(pre_save_pkId)}
        "blockCode": ${read_extract_arg(blockCode)}
        "isEditCode": false
        "targetFields": [ ]
        "dealId": ""
        dealConfJson: >-
          {"param1":"","url":"www","startType":"1","statusType":"1","nodeType":"1","startParam":"[{\"Value\":\"1\"}]","statusParam":"[{\"Value\":\"1\"}]","nodeParam":"[{\"Value\":\"1\"}]"}
        "isNeedCheck": "1"
        "isAdd": "1"
        "status": "01"
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: sys_list
  story: 积木定义-系统交互
  title: 新增系统交互-查看列表
  request:
    method: POST
    url: api/agnes-ac/v2/block/page/list?pageIndex=0&pageSize=500
    headers:
      cookie: ${read_extract_arg(token)}
    json:
        "pageIndex": 0
        "pageSize": 500
        "blockName": ""
        "blockType": ${read_extract_arg(blockType)}
        "status": ""
  extract:
    total: $.data.total
    info_list: $.data.
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: sys_edit
  story: 积木定义-系统交互
  title: 编辑接口积木
  request:
    method: POST
    url: api/agnes-ac/v2/block/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
        "blockCode": ${read_extract_arg(blockCode)}
        "blockName": ${read_extract_arg(blockName)}
        "blockType": ${read_extract_arg(blockType)}
        "crtUser": ${read_extract_arg(crtUser)}
        "dealConfJson": >-
          {"param1":"","url":"www1","startType":"1","statusType":"1","nodeType":"1","startParam":"[{\"Value\":\"1\"}]","statusParam":"[{\"Value\":\"1\"}]","nodeParam":"[{\"Value\":\"1\"}]"}
        "dealType": ${read_extract_arg(dealType)}
        "isDel": "0"
        "isEditCode": false
        "pkId": ${read_extract_arg(pre_save_pkId)}
        "status": "01"
        "updateUser": ${read_extract_arg(updateUser)}
        "blockDesc": ""
        "targetFields": [ ]
        "dealId": ""
        "isNeedCheck": "1"
  validate:
    codes: 200
    equals:
      msgType: "success"

