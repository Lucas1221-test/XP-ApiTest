#积木管理--流程处理类-流程处理
-
  name: test_lccl_get_brick_type
  story: 积木定义-流程处理
  title: 获取积木类型
  request:
    method: POST
    url: api/agnes-ac/v2/block/get-tree-node
    headers:
      cookie: ${read_extract_arg(token)}
  extract:
    blockType: $.data.children[3].id
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_add_lccl
  story: 积木定义-流程处理
  title: 新增资料审阅积木
  request:
    method: POST
    url: api/agnes-ac/v2/block/check/blockName
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockName": "111"
      "dealType": "08"
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: lccl_get_blockCode
  story: 积木定义-流程处理
  title: 新增积木后获取blockCode
  request:
    method: POST
    url: api/agnes-ac/v2/model/code/get-model-code?model=block
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "model": "block"
  extract:
    blockCode: $.data
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: lccl_pre_save
  story: 积木定义-流程处理
  title: 新增流程处理-接口积木-pre-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/pre-save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockCode": ${read_extract_arg(blockCode)}
      "blockName": "111"
      "blockType": ${read_extract_arg(blockType)}
      "dealType": "08"
      "status": "00"
  extract:
    pkId: $.data.pkId
    blockName: $.data.blockName
    pre_save_info : $.data.
    dealType : $.data.dealType
    crtUser : $.data.crtUser
    updateUser : $.data.updateUser
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: lccl_add
  story: 积木定义-流程处理
  title: 新增流程处理-接口积木-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockType": ${read_extract_arg(blockType)}
      "blockName": ${read_extract_arg(blockName)}
      "dealType": ${read_extract_arg(dealType)}
      "pkId": ${read_extract_arg(pkId)}
      "blockCode": ${read_extract_arg(blockCode)}
      "isEditCode": false
      "allowManualConfirm": "1"
      "isAllowExecAgain": "1"
      "targetFields": []
      "dealId": ""
      "blockParamInfos": [
          "fieldCode": "processInstanceId",
          "fieldName": "processInstanceId",
          "paramType": "out",
          "fieldType": "String"
      ]
      "isNeedCheck": "1"
      "isAdd": "1"
      "status": "01"
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: lccl_list
  story: 积木定义-流程处理
  title: 新增流程处理-查看列表
  request:
    method: POST
    url: api/agnes-ac/v2/block/page/list?pageIndex=0&pageSize=500
    headers:
      cookie: ${read_extract_arg(token)}
    json:
        "pageIndex": 0
        "pageSize": 500
        "blockName": ""
        "blockType": "04"
        "status": ""
  extract:
    total: $.data.total
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: lccl_edit
  story: 积木定义-流程处理
  title: 新增流程处理-编辑
  request:
    method: POST
    url: api/agnes-ac/v2/block/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "allowManualConfirm": "1"
      "blockCode": ${read_extract_arg(blockCode)}
      "blockName": "1111"
      "blockType": ${read_extract_arg(blockType)}
      "crtUser": ${read_extract_arg(crtUser)}
      "dealType": ${read_extract_arg(dealType)}
      "isAllowExecAgain": "1"
      "isDel": "0"
      "isEditCode": false
      "pkId": ${read_extract_arg(pkId)}
      "status": "01"
      "updateUser": ${read_extract_arg(updateUser)}
      "updateTs": ${get_current_time()}
      "blockDesc": ""
      "targetFields": []
      "dealId": ""
      "blockParamInfos": [
          "fieldCode": "processInstanceId",
          "fieldName": "processInstanceId",
          "paramType": "out",
          "fieldType": "String"
      ]
      "isNeedCheck": "1"
  validate:
    codes: 200
    equals:
      msgType: "success"

