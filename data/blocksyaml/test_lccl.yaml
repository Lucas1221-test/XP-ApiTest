-
  name: lccl_copy
  story: 积木定义-流程处理
  title: 新增流程处理-复制
  request:
    method: POST
    url: api/agnes-ac/v2/block/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "allowManualConfirm": "1"
      "blockCode": ${read_extract_arg(copy_blockCode)}
      "blockName": ${read_extract_arg(copy_blockName)}
      "blockType": ${read_extract_arg(blockType)}
      "crtUser": ${read_extract_arg(crtUser)}
      "dealType": ${read_extract_arg(dealType)}
      "isAllowExecAgain": "1"
      "isDel": "0"
      "isEditCode": false
      "pkId": ""
      "status": "01"
      "updateUser": ${read_extract_arg(updateUser)}
      "updateTs": ${get_current_time()}
      "blockDesc": ""
      "targetFields": []
      "dealId": ""
      "blockParamInfos":
          "fieldCode": "processInstanceId"
          "fieldName": "processInstanceId"
          "paramType": "out"
          "fieldType": "String"
      "isNeedCheck": "1"
  validate:
    codes: 200
    equals:
      msgType: "success"

