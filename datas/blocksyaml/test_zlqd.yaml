      "pkId": ${read_extract_arg(pkId)}
      "status": "01"
      "updateUser": ${read_extract_arg(updateUser)}
      "updateTs": ${get_current_time()}
      "blockDesc": ""
      "targetFields": []
      "blockParamInfos": []
      "isNeedCheck": "1"
  validate:
    codes: 200
    equals:
      msgType: "success"
