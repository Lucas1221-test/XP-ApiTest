#积木管理--资料清单类-资料清单
-
  name: test_get_brick_type
  story: 积木定义-资料清单-资料清单
  title: 获取积木类型
  request:
    method: POST
    url: api/agnes-ac/v2/block/get-tree-node
    headers:
      cookie: ${read_extract_arg(token)}
  extract:
    blockType: $.data.children[5].id
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_add_zlqd
  story: 积木定义-资料清单-资料清单
  title: 新增资料清单积木
  request:
    method: POST
    url: api/agnes-ac/v2/block/check/blockName
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockName": "111"
      "dealType": "20"
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: info_get_zlqd_blockCode
  story: 积木定义-资料清单-资料清单
  title: 新增积木后获取blockCode
  request:
    method: POST
    url: api/agnes-ac/v2/model/code/get-model-code?model=block
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "model": "block"
  extract:
    blockCode: $.data
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: info_zlqd_pre_save
  story: 积木定义-资料清单-资料清单
  title: 新增资料清单-接口积木-pre-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/pre-save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockCode": ${read_extract_arg(blockCode)}
      "blockName": "111"
      "blockType": ${read_extract_arg(blockType)}
      "dealType": "20"
      "status": "00"
  extract:
    pkId: $.data.pkId
    blockName: $.data.blockName
    pre_save_info : $.data.
    dealType : $.data.dealType
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: info_zlqd_add
  story: 积木定义-资料清单-资料清单
  title: 新增资料清单-接口积木-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockType": ${read_extract_arg(blockType)}
      "blockName": ${read_extract_arg(blockName)}
      "dealType": ${read_extract_arg(dealType)}
      "pkId": ${read_extract_arg(pkId)}
      "blockCode": ${read_extract_arg(blockCode)}
      "isEditCode": false
      "allowManualConfirm": "1"
      "targetFields": []
      "dealId": "01"
      "blockParamInfos": []
      "isNeedCheck": "1"
      "isAdd": "1"
      "status": "01"
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: info_zlqd_list
  story: 积木定义-资料清单-资料清单
  title: 新增资料清单-查看列表
  request:
    method: POST
    url: api/agnes-ac/v2/block/page/list?pageIndex=0&pageSize=500
    headers:
      cookie: ${read_extract_arg(token)}
    json:
        "pageIndex": 0
        "pageSize": 500
        "blockName": ""
        "blockType": ${read_extract_arg(blockType)}
        "status": ""
  extract:
    total: $.data.total
  validate:
    codes: 200
    equals:
      msgType: "success"

