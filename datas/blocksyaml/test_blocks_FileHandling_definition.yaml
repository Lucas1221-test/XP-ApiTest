###   积木管理-文件处理类   ###
-
  name: test_get_fh_brick_type
  story: 积木定义-文件处理类-在线编辑
  title: 获取积木类型-文件处理类
  request:
    method: POST
    url: api/agnes-ac/v2/block/get-tree-node
    headers:
      cookie: ${read_extract_arg(token)}
  extract:
    fh_blockType: $.data.children[2].id
  validate:
    codes: 200
    equals:
      msgType: "success"



