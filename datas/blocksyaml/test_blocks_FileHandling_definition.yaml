-
  name: test_add_fhedit_pre_save
  story: 积木定义-文件处理类-在线编辑
  title: 新增文件处理-在线编辑-pre-save
  request:
    method: POST
    url: api/agnes-ac/v2/block/pre-save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      "blockCode": ${read_extract_arg(fhedit_blockCode)}
      "blockName": "autotest-文件处理类-在线编辑"
      "blockType": ${read_extract_arg(fh_blockType)}
      "dealType": "25"
      "status": "00"
  extract:
    pre_save_fhedit_pkId: $.data.pkId
    fhedit_blockName: $.data.blockName
    pre_save_fhedit_info : $.data
  validate:
    codes: 200
    equals:
      msgType: "success"

-
  name: test_add_fhedit_interface_blocks
  story: 积木定义-文件处理类-在线编辑
  title: 文件处理类-在线编辑-新增保存
  request:
    method: POST
    url: api/agnes-ac/v2/block/save
    headers:
      cookie: ${read_extract_arg(token)}
    json:
      blockType: ${read_extract_arg(fh_blockType)}
      blockName: ${read_extract_arg(fhedit_blockName)}
      dealType: '25'
      pkId: ${read_extract_arg(pre_save_fhedit_pkId)}
      blockCode: ${read_extract_arg(fhedit_blockCode)}
      isEditCode: false
      allowManualConfirm: '1'
      targetFields: [ ]
      dealId: ''
      blockDesc: test-add
      dealConfJson: '[{"fileName":"资料","docId":"test$x$$y$"}]'
      blockParamInfos:
        - fieldCode: x
          fieldName: x
          paramType: in
          fieldType: String
        - fieldCode: 'y'
          fieldName: 'y'
          paramType: in
          fieldType: String
      isNeedCheck: '1'
      isAdd: '1'
      status: '01'
  validate:
    codes: 200
    equals:
      msgType: "success"


