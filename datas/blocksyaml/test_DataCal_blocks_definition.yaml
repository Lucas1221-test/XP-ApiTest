          proc: "create table AUTO_Student_AIMTEST\r\n(\r\n    SNO1       VARCHAR2(3) not null\r\n        primary key,\r\n    SNAME1     VARCHAR2(8) not null,\r\n    SSEX1      VARCHAR2(2) not null,\r\n    SBIRTHDAY1 DATE        default NULL,\r\n    SCLASS1    VARCHAR2(5) default NULL\r\n)\r\n/\r\n\r\n"
          file: ''
        dopOPDSReKpiParams:
          noManualRefresh: '0'
        kpiAuthInfo:
          kpiCode: ${read_extract_arg(dcm_blockCode)}
