          kpiName: ${read_extract_arg(dcm_blockName)}
          execFunc: ''
          execType: '1'
        dopOPDSReKpiDetail:
          detailType: '01'
          allowManual: '0'
          allowEditReason: '0'
          externalPageAddr: ''
          allowSkipExternalPage: '0'
          kpiFieldsList:
            - fieldName: SNO
              isDisplay: '1'
              align: left
              isQuery: '0'
              index: 0
            - fieldName: SNAME
              isDisplay: '1'
              align: left
              isQuery: '0'
              index: 1
            - fieldName: SSEX
              isDisplay: '1'
              align: left
              isQuery: '0'
              index: 2
            - fieldName: SBIRTHDAY
              isDisplay: '1'
              align: left
              isQuery: '0'
              index: 3
            - fieldName: SCLASS
              isDisplay: '1'
              align: left
              isQuery: '0'
              index: 4
          mode: ''
          exeScript: select * from AUTO_Student
      isNeedCheck: '1'
      isAdd: '1'
      status: '01'
  validate:
    codes: 200
    equals:
      msgType: "success"


